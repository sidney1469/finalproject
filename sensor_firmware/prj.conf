# -----------------------------
# I2C Support
# -----------------------------
CONFIG_I2C=y
CONFIG_I2C_NRFX=y

# -----------------------------
# Logging (optional but recommended)
# -----------------------------
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# -----------------------------
# Thread stack (UBX parsing needs some room)
# -----------------------------
CONFIG_MAIN_STACK_SIZE=4096

# -----------------------------
# Enable printk (for debugging)
# -----------------------------
CONFIG_PRINTK=y
CONFIG_STDOUT_CONSOLE=y